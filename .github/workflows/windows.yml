name: Windows
on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - qt_version: 6.10.3
            qt_arch: win64_msvc2022_64
            arch: x64
            modules: ''

    env:
      BUILD_TYPE: Release
      BUILD_PATH: build
      QT_TARGET: desktop
      QT_HOST: windows
      ARCHIVE_NAME: MergeQt-${{ matrix.qt_version }}-${{ matrix.qt_arch }}

    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ env.QT_HOST }}
          target: ${{ env.QT_TARGET }}
          arch: ${{ matrix.qt_arch }}
          install-deps: true
          cache: true
          modules: ${{ matrix.modules }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: CMake Configure
        shell: cmd
        run: |
          cmake ^
            -A ${{ matrix.arch }} ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DCMAKE_INSTALL_PREFIX=${{ env.BUILD_PATH }}/install/${{ env.BUILD_TYPE }} ^
            -B ${{ env.BUILD_PATH }}

      - name: CMake Install
        shell: cmd
        run: |
          cmake ^
            --build ${{ env.BUILD_PATH }} ^
            --target install ^
            --config ${{ env.BUILD_TYPE }} ^
            -j

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}.zip
          path: ${{ github.workspace }}/${{ env.BUILD_PATH }}/install/${{ env.BUILD_TYPE }}
          if-no-files-found: error

      - name: Package
        if: startsWith(github.event.ref, 'refs/tags/')
        shell: pwsh
        env:
          PACKAGE_PATH: ${{ github.workspace }}/${{ env.BUILD_PATH }}/install/${{ env.BUILD_TYPE }}
        run: |
          Compress-Archive -Path $env:PACKAGE_PATH/* -DestinationPath "${{ github.workspace }}/${{ env.ARCHIVE_NAME }}.zip"

      - name: Upload Release
        if: startsWith(github.event.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/${{ env.ARCHIVE_NAME }}.zip
          asset_name: ${{ env.ARCHIVE_NAME }}.zip
          tag: ${{ github.ref }}
          overwrite: true
